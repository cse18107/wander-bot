{{- if .Values.api.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "wanderbot.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: api
{{- if .Values.keda.enabled }}
---
# Event-driven autoscaling for the worker tier (queue depth beats CPU for bursty
# agent workloads). Min replicas >= 1 — no scale-to-zero for stateful runs.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Release.Name }}-workers
spec:
  scaleTargetRef:
    name: {{ .Release.Name }}-api
  minReplicaCount: {{ .Values.keda.minReplicas }}
  maxReplicaCount: {{ .Values.keda.maxReplicas }}
  triggers:
    - type: redis
      metadata:
        address: {{ .Values.keda.redisAddress }}
        listName: {{ .Values.keda.listName }}
        listLength: "{{ .Values.keda.listLength }}"
{{- end }}
