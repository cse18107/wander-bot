apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mcp
  labels:
    {{- include "wanderbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        {{- include "wanderbot.labels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
    spec:
      serviceAccountName: {{ .Release.Name }}-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 10002
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: mcp
          image: {{ include "wanderbot.mcpImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mcp.port }}
          envFrom:
            - secretRef: { name: {{ .Release.Name }}-secrets }
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mcp
  labels:
    {{- include "wanderbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  selector:
    app.kubernetes.io/component: mcp
  ports:
    - port: 8090
      targetPort: {{ .Values.mcp.port }}
