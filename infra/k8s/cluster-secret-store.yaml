# ClusterSecretStore the app's ExternalSecret references (name: aws-secrets-manager).
# Auth is via the ESO controller's IRSA role (annotated at install time), so no keys here.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: __AWS_REGION__
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
