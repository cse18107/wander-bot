name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install
        run: uv pip install --system --break-system-packages ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Mypy
        run: mypy src
      - name: Unit + integration tests
        run: pytest -m "not live" --maxfail=1 -q

  # Live sandbox contract tests run nightly, not on every PR (need vendor creds).
  live-contract:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv pip install --system ".[dev]"
      - run: pytest -m live -q
        env:
          WB_AMADEUS_CLIENT_ID: ${{ secrets.WB_AMADEUS_CLIENT_ID }}
          WB_AMADEUS_CLIENT_SECRET: ${{ secrets.WB_AMADEUS_CLIENT_SECRET }}
