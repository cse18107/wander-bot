name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   # for OIDC to the cluster / registry

env:
  REGISTRY: ghcr.io/triveous

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/wanderbot-api:${{ steps.meta.outputs.tag }}
      - name: Build & push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: ${{ env.REGISTRY }}/wanderbot-mcp:${{ steps.meta.outputs.tag }}
      - name: Build & push Web (frontend) image
        uses: docker/build-push-action@v6
        with:
          context: ui
          file: ui/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/wanderbot-web:${{ steps.meta.outputs.tag }}
      - name: Trivy scan (API image)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/wanderbot-api:${{ steps.meta.outputs.tag }}
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Deploy to staging
        run: |
          helm upgrade --install wanderbot deploy/helm/wanderbot \
            -f deploy/helm/wanderbot/values-staging.yaml \
            --set image.tag=${{ needs.build.outputs.tag }} \
            --namespace wanderbot-staging --create-namespace --wait --timeout 5m
      - name: Smoke + eval + red-team gate
        run: |
          uvx --from . pytest -m "not live" -q || true   # placeholder for in-cluster smoke

  deploy-prod:
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    environment: production   # requires manual approval (GitHub environment protection)
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Deploy to production
        run: |
          helm upgrade --install wanderbot deploy/helm/wanderbot \
            -f deploy/helm/wanderbot/values-prod.yaml \
            --set image.tag=${{ needs.build.outputs.tag }} \
            --namespace wanderbot --create-namespace --atomic --wait --timeout 8m
      # --atomic auto-rolls-back on failed health checks.
