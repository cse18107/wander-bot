name: CD

# Deploy to the Lightsail box. Runs automatically after the CI workflow
# succeeds on main (so untested code never deploys), or manually via the
# "Run workflow" button.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-lightsail
  cancel-in-progress: false

jobs:
  deploy:
    # Manual runs always proceed; automatic runs only if CI passed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync source to server
        run: |
          rsync -avz --delete \
            --exclude '.git' --exclude 'node_modules' --exclude 'ui/node_modules' \
            --exclude '.venv' --exclude '__pycache__' --exclude '*.db' \
            --exclude '.env' --exclude 'infra' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ubuntu@${{ secrets.LIGHTSAIL_HOST }}:~/wanderbot/

      - name: Build & restart on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.LIGHTSAIL_HOST }} \
            'cd ~/wanderbot/deploy/lightsail && \
             docker compose -f docker-compose.prod.yml up -d --build && \
             docker image prune -f && \
             docker compose -f docker-compose.prod.yml ps'
